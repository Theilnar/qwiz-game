<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Свояк ИИ 2.9.2 - Balanced Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: #161b22; border-radius: 12px; padding: 20px; margin: 15px auto; border: 1px solid #30363d; }
        button { background: #238636; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button.delete-btn { background: #da3633; padding: 2px 8px; font-size: 11px; margin-left: 10px; border-radius: 4px; }
        button.modifier-action { background: #d29922; color: #000; width: 100%; font-size: 18px; margin-top: 10px; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; margin: 5px; }
        .themes-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 20px 0; }
        .theme-column { background: #0d1117; border-radius: 8px; padding: 10px; border: 1px solid #30363d; }
        .theme-title { font-size: 11px; font-weight: 800; color: #58a6ff; min-height: 45px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .question-cell { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 15px 5px; margin: 5px 0; font-size: 24px; font-weight: bold; cursor: pointer; color: #d29922; }
        .question-cell.answered { color: #484f58; opacity: 0.3; pointer-events: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #161b22; border-radius: 12px; padding: 30px; max-width: 600px; width: 90%; border: 1px solid #30363d; }
        .modifier-info { background: #f2cc60; color: #000; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; border: 2px solid #d29922; }
        .player-card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 10px; display: flex; align-items: center; justify-content: space-between; min-width: 150px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Свояк: Сборка 2.9.2 (Balanced)</h1>
        
        <div class="card">
            <input type="password" id="apiKeyInput" placeholder="Gemini API Key" style="width: 180px;">
            <select id="gameMode">
                <option value="детский (простые и веселые темы для детей)">👶 Детский режим</option>
                <option value="средний (классический Свояк, общие знания)" selected>👨 Обычный режим</option>
                <option value="усложненный (интересные факты, требующие логики, но без зауми)">🔥 Умный режим (Тур 2)</option>
            </select>
            <button onclick="saveKey()">💾 Ключ</button>
            <br>
            <input type="text" id="playerNameInput" placeholder="Имя игрока">
            <button onclick="addPlayer()" style="background: #1f6feb;">➕ Игрок</button>
            <button onclick="fullGameGenerate()" id="mainBtn" style="background: #238636;">🚀 СОЗДАТЬ ИГРУ</button>
            <button onclick="connectBluetooth()" style="background: #8b5cf6;">🔌 КНОПКИ</button>
        </div>

        <div id="playersList" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;"></div>

        <div id="gameBoard" style="display: none;" class="card">
            <div id="themesGrid" class="themes-grid"></div>
        </div>

        <div id="questionModal" class="modal">
            <div class="modal-content">
                <div id="modDisplay" class="modifier-info" style="display:none;"></div>
                <div id="modalTheme" style="color: #58a6ff;"></div>
                <div id="modalValue" style="color: #d29922; font-size: 32px;"></div>
                
                <div id="qContent">
                    <div id="modalQuestion" style="font-size: 22px; margin: 20px 0;"></div>
                    <button onclick="document.getElementById('ans').style.display='block'" style="width: 100%; background: #30363d;">ПОКАЗАТЬ ОТВЕТ</button>
                    <div id="ans" style="display:none; color: #3fb950; padding: 15px; font-size: 20px; font-weight: bold; border: 1px dashed #238636; margin: 10px 0;"></div>
                </div>

                <div id="scoringZone" style="margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px;">
                    <label>Выбор игрока:</label><br>
                    <select id="playerSelector" style="width: 80%;"></select>
                    
                    <div id="standardButtons" style="display: flex; gap: 10px; margin-top: 10px;">
                        <button onclick="handleScore(true)" style="background: #238636; flex: 1;">✅ ПРАВИЛЬНО</button>
                        <button onclick="handleScore(false)" style="background: #da3633; flex: 1;">❌ ОШИБКА</button>
                    </div>
                    
                    <button id="modButton" class="modifier-action" style="display:none;"></button>
                    <button onclick="refreshSingleQuestion()" id="refreshBtn" style="background: #1f6feb; width: 100%; margin-top: 10px;">🔄 ОБНОВИТЬ ВОПРОС</button>
                </div>
                <button onclick="closeModal()" style="background: none; color: #8b949e; margin-top: 15px;">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('gemini_key') || '';
        let players = JSON.parse(localStorage.getItem('game_players')) || [{id: 1, name: 'Игрок 1', score: 0}];
        let gameData = []; let currentQ = null;
        let bleCharacteristic = null; let isButtonBlocked = false; let bleQueue = Promise.resolve();
        
        // Используем самую стабильную модель
        // Самая стабильная модель из новых с лимитом 500/день
		const MODEL_NAME = 'gemini-3-flash-preview';
		//const MODEL_NAME = 'gemini-3.1-flash-lite';
		//const MODEL_NAME = 'gemma-4-31b';


        document.getElementById('apiKeyInput').value = API_KEY;
        renderPlayers();

        function saveKey() {
            API_KEY = document.getElementById('apiKeyInput').value;
            localStorage.setItem('gemini_key', API_KEY);
            alert('Ключ сохранен');
        }

        function addPlayer() {
            const name = document.getElementById('playerNameInput').value.trim() || `Игрок ${players.length + 1}`;
            players.push({ id: Date.now(), name: name, score: 0 });
            renderPlayers();
            document.getElementById('playerNameInput').value = '';
        }

        function removePlayer(id) {
            if (players.length <= 1) return alert("Минимум 1 игрок!");
            players = players.filter(p => p.id !== id);
            renderPlayers();
        }

        function renderPlayers() {
            localStorage.setItem('game_players', JSON.stringify(players));
            document.getElementById('playersList').innerHTML = players.map(p => `
                <div class="player-card">
                    <div><b>${p.name}</b>: <span style="color:#d29922">${p.score}</span></div>
                    <button class="delete-btn" onclick="removePlayer(${p.id})">❌</button>
                </div>
            `).join('');
            document.getElementById('playerSelector').innerHTML = players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }



		async function fullGameGenerate() {
			if (!API_KEY) return alert("Введите ключ!");
			const btn = document.getElementById('mainBtn');
			const mode = document.getElementById('gameMode').value;
			btn.innerText = '⌛ Генерация...'; btn.disabled = true;

			// Немного упростили темы для "Умного режима"
			const allThemes = ["Космос", "СССР", "Авто", "Гаджеты", "Мультфильмы", "Еда", "География", "Кино", "Наука", "Животные", "История", "Музыка", "Бренды", "Спорт", "Игры"];
			const selected = allThemes.sort(() => 0.5 - Math.random()).slice(0, 6).join(", ");

			// Важно: эта ссылка и модель точно работают
			const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

			const prompt = `Ты ведущий викторины. Сгенерируй игру. Темы: ${selected}. 
			СЛОЖНОСТЬ: ${mode} (сделай интересно, но без зауми).
			Верни ТОЛЬКО чистый JSON массив.
			JSON формат: [{"theme": "Название", "questions": [{"val": 10, "q": "Вопрос", "a": "Ответ"}, ...]}, ...]`;

			try {
				const resp = await fetch(url, { 
					method: 'POST', 
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) 
				});
				
				const data = await resp.json();
				if (data.error) throw new Error(data.error.message);

				let text = data.candidates[0].content.parts[0].text;
				
				// Очистка JSON от лишнего
				const startIdx = text.indexOf('[');
				const endIdx = text.lastIndexOf(']') + 1;
				gameData = JSON.parse(text.substring(startIdx, endIdx));
				
				renderBoard();
				document.getElementById('gameBoard').style.display = 'block';
			} catch (e) { 
				console.error(e);
				alert("Ошибка: " + e.message); 
			}
			finally { btn.innerText = '🚀 СОЗДАТЬ ИГРУ'; btn.disabled = false; }
		}

        function openModal(tIdx, qIdx) {
            currentQ = gameData[tIdx].questions[qIdx];
            if (currentQ.done) return;
            
            const modDisplay = document.getElementById('modDisplay');
            const qContent = document.getElementById('qContent');
            const stdBtns = document.getElementById('standardButtons');
            const modBtn = document.getElementById('modButton');
            const refreshBtn = document.getElementById('refreshBtn');

            modDisplay.style.display = 'none';
            qContent.style.display = 'block';
            stdBtns.style.display = 'flex';
            modBtn.style.display = 'none';
            refreshBtn.style.display = 'block';

            if (currentQ.mod) {
                modDisplay.style.display = 'block';
                modDisplay.innerText = "⚠️ МОДИФИКАТОР: " + currentQ.mod;
                
                if (currentQ.mod === "ИНВЕРСИЯ") {
                    modDisplay.innerText += " (Очки меняют знак +/-)";
                    qContent.style.display = 'none'; stdBtns.style.display = 'none'; refreshBtn.style.display = 'none';
                    modBtn.style.display = 'block'; modBtn.innerText = "🌀 ПРИМЕНИТЬ ИНВЕРСИЮ";
                    modBtn.onclick = () => { 
                        let p = players.find(x => x.id == document.getElementById('playerSelector').value);
                        p.score *= -1; currentQ.done = true; closeModal(); renderPlayers(); renderBoard();
                    };
                } else if (currentQ.mod === "РАСКУЛАЧИВАНИЕ") {
                    modDisplay.innerText += " (Лидер отдает 50 очков аутсайдеру)";
                    qContent.style.display = 'none'; stdBtns.style.display = 'none'; refreshBtn.style.display = 'none';
                    modBtn.style.display = 'block'; modBtn.innerText = "💸 ПЕРЕВЕСТИ БАЛЛЫ";
                    modBtn.onclick = () => {
                        let sorted = [...players].sort((a,b) => b.score - a.score);
                        if(sorted.length > 1) { sorted[0].score -= 50; sorted[sorted.length-1].score += 50; }
                        currentQ.done = true; closeModal(); renderPlayers(); renderBoard();
                    };
                }
            }

            document.getElementById('modalTheme').innerText = gameData[tIdx].theme;
            document.getElementById('modalValue').innerText = currentQ.val;
            document.getElementById('modalQuestion').innerText = currentQ.q;
            document.getElementById('ans').innerText = currentQ.a;
            document.getElementById('ans').style.display = 'none';
            document.getElementById('questionModal').classList.add('active');
            isButtonBlocked = false; sendBleCmd("C0");
        }

        async function refreshSingleQuestion() {
            const btn = document.getElementById('refreshBtn');
            btn.innerText = '⏳...';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
            const prompt = `Замени вопрос. Тема: "${document.getElementById('modalTheme').innerText}", номинал ${currentQ.val}. Короткий ответ. JSON: {"q":"текст","a":"ответ"}`;
            try {
                const resp = await fetch(url, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                const newQ = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                currentQ.q = newQ.q; currentQ.a = newQ.a;
                document.getElementById('modalQuestion').innerText = currentQ.q;
                document.getElementById('ans').innerText = currentQ.a;
            } catch (e) { console.error(e); } finally { btn.innerText = '🔄 ОБНОВИТЬ ВОПРОС'; }
        }

        function handleScore(isCorrect) {
            const pId = document.getElementById('playerSelector').value;
            const pIdx = players.findIndex(p => p.id == pId);
            const p = players[pIdx];
            if (p) {
                if (isCorrect) {
                    p.score += currentQ.val; currentQ.done = true;
                    sendBleCmd("W" + (pIdx + 1));
                    setTimeout(() => { closeModal(); renderBoard(); }, 1000);
                } else {
                    p.score -= currentQ.val; sendBleCmd("E" + (pIdx + 1));
                    isButtonBlocked = false;
                }
                if (pIdx === 0) sendBleCmd("S" + p.score);
                renderPlayers();
            }
        }

        function renderBoard() {
            const grid = document.getElementById('themesGrid'); grid.innerHTML = '';
            gameData.forEach((t, tIdx) => {
                const col = document.createElement('div'); col.className = 'theme-column';
                col.innerHTML = `<div class="theme-title">${t.theme}</div>`;
                t.questions.forEach((q, qIdx) => {
                    const cell = document.createElement('div');
                    cell.className = 'question-cell' + (q.done ? ' answered' : '');
                    cell.innerText = q.val;
                    cell.onclick = () => openModal(tIdx, qIdx);
                    col.appendChild(cell);
                });
                grid.appendChild(col);
            });
        }

        function sendBleCmd(cmd) {
            if (!bleCharacteristic) return;
            bleQueue = bleQueue.then(async () => {
                try { await bleCharacteristic.writeValue(new TextEncoder().encode(cmd)); await new Promise(r => setTimeout(r, 100)); } catch (e) {}
            });
        }

        async function connectBluetooth() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Svoyak_Buttons' }], optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
                bleCharacteristic = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    if (isButtonBlocked || document.getElementById('modButton').style.display === 'block') return;
                    const val = new TextDecoder().decode(e.target.value);
                    const p = players[parseInt(val)-1];
                    if (p) {
                        isButtonBlocked = true; document.getElementById('playerSelector').value = p.id;
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance(p.name));
                    }
                });
                alert("Кнопки подключены!");
            } catch (e) { alert("Ошибка Bluetooth"); }
        }

        function closeModal() { document.getElementById('questionModal').classList.remove('active'); }
    </script>
</body>
</html>
